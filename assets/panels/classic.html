<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: dark light;
      --bg: #080d12;
      --panel: rgba(25, 33, 42, 0.86);
      --panel-border: rgba(255, 255, 255, 0.15);
      --line: rgba(255, 255, 255, 0.13);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.58);
      --track: rgba(255, 255, 255, 0.07);
      --button: rgba(255, 255, 255, 0.08);
      --button-border: rgba(255, 255, 255, 0.18);
      --button-hover: rgba(255, 255, 255, 0.13);
      --claude: #f49164;
      --codex: #58d6e6;
      --projects: #30d158;
      --warn: #ffc439;
      --danger: #ff453a;
      --radius: 8px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #eef2f7;
        --panel: rgba(255, 255, 255, 0.88);
        --panel-border: rgba(20, 28, 38, 0.14);
        --line: rgba(20, 28, 38, 0.13);
        --text: rgba(12, 18, 26, 0.9);
        --muted: rgba(12, 18, 26, 0.55);
        --track: rgba(12, 18, 26, 0.06);
        --button: rgba(12, 18, 26, 0.05);
        --button-border: rgba(12, 18, 26, 0.14);
        --button-hover: rgba(12, 18, 26, 0.10);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans TC", sans-serif;
      letter-spacing: 0;
      overscroll-behavior: none;
    }

    body {
      padding: 12px;
      background:
        linear-gradient(180deg, #111b25 0%, #0b1118 44%, var(--bg) 100%);
    }

    @media (prefers-color-scheme: light) {
      body {
        background:
          linear-gradient(180deg, #f8fafc 0%, #eef3f8 48%, var(--bg) 100%);
      }
    }

    .wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      height: 100%;
    }

    .card,
    .footer {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
      overflow: hidden;
    }

    .card {
      padding: 13px 15px 12px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), transparent 72%);
      opacity: 0.72;
    }

    .brand {
      display: flex;
      align-items: center;
      height: 32px;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand img {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      object-fit: cover;
      flex: none;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.12),
        0 6px 14px color-mix(in srgb, var(--accent) 24%, transparent);
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 24%, transparent);
    }

    .brand h1 {
      margin: 0;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 21px;
      line-height: 1;
      font-weight: 780;
    }

    .card[data-card="projects"] .brand {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      align-items: center;
      height: auto;
      row-gap: 10px;
      margin-bottom: 10px;
    }

    .card[data-card="projects"] .brand-icon {
      grid-column: 1;
    }

    .card[data-card="projects"] h1 {
      grid-column: 2;
    }

    .project-actions {
      grid-column: 1 / 3;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .project-actions .switch {
      width: 100%;
      min-width: 0;
    }

    .switch {
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--button-border);
      border-radius: 8px;
      background: var(--button);
      color: var(--text);
      font: 650 12px/26px -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      white-space: nowrap;
    }

    .row + .row {
      border-top: 1px solid var(--line);
      margin-top: 8px;
      padding-top: 8px;
    }

    .row-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 5px;
    }

    .row-title {
      font-size: 15px;
      line-height: 18px;
      font-weight: 740;
    }

    .percent {
      font-size: 13px;
      line-height: 18px;
      font-weight: 760;
      color: var(--accent);
      white-space: nowrap;
    }

    .track {
      height: 8px;
      border-radius: 99px;
      overflow: hidden;
      background: var(--track);
      box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.18);
    }

    .fill {
      width: 0%;
      height: 100%;
      min-width: 0;
      border-radius: inherit;
      background: var(--fill-color, var(--accent));
      background-image: linear-gradient(180deg, color-mix(in srgb, var(--fill-color, var(--accent)) 100%, white 12%), var(--fill-color, var(--accent)));
      box-shadow: 0 0 12px color-mix(in srgb, var(--fill-color, var(--accent)) 30%, transparent);
      transition: width 140ms ease-out, background-color 140ms ease-out;
    }

    .reset {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 13px;
      font-weight: 620;
      text-align: right;
      white-space: nowrap;
    }

    .reset[data-warning="true"] {
      color: #ff3b30;
    }

    .row[data-available="false"] .percent,
    .row[data-available="false"] .reset {
      color: var(--muted);
    }

    .row[data-available="false"] .fill {
      width: 0%;
    }

    .proj-row {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr) auto auto;
      align-items: baseline;
      gap: 8px;
      padding: 8px 0 11px;
      border-top: 1px solid var(--line);
      font-size: 13.5px;
      line-height: 18px;
    }

    .proj-row:first-child {
      border-top: none;
      font-weight: 760;
    }

    .proj-rank {
      width: 16px;
      color: var(--muted);
      font-weight: 720;
      font-size: 12px;
    }

    .proj-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .proj-row:first-child .proj-name {
      color: var(--text);
    }

    .proj-tokens {
      color: var(--accent);
      font-weight: 790;
      white-space: nowrap;
      text-align: right;
      min-width: 84px;
    }

    .proj-cost {
      color: color-mix(in srgb, var(--muted) 70%, transparent);
      font-size: 12px;
      white-space: nowrap;
    }

    .proj-bar {
      grid-column: 1 / -1;
      height: 3px;
      border-radius: 2px;
      background: var(--track);
      overflow: hidden;
      align-self: end;
    }

    .proj-bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 72%, transparent), var(--accent));
      opacity: 0.7;
    }

    .proj-row:first-child .proj-bar {
      height: 3.5px;
    }

    .proj-row:first-child .proj-bar-fill {
      opacity: 1;
    }

    .footer {
      min-height: 144px;
      padding: 12px 15px 11px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .meta > div {
      padding: 3px 8px;
      border-radius: 6px;
      background: color-mix(in srgb, var(--button) 78%, transparent);
      border: 1px solid var(--button-border);
      color: var(--muted);
      font-size: 12px;
      line-height: 16px;
      font-weight: 640;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .today {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      color: var(--text);
      font-size: 15px;
      line-height: 20px;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }


    .action {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      border: 1px solid var(--button-border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--button) 70%, transparent);
      color: var(--muted);
      font: 700 13px/1 -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      white-space: nowrap;
      flex: 1;
    }

    .action,
    .switch {
      transition: filter 80ms ease-out, transform 80ms ease-out;
    }

    .action:active,
    .switch:active {
      filter: brightness(0.82);
      transform: scale(0.98);
    }

    .action.primary {
      border-color: rgba(88, 214, 230, 0.30);
      background: linear-gradient(180deg, rgba(88, 214, 230, 0.26), rgba(24, 172, 216, 0.18));
      color: rgba(255, 255, 255, 0.92);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .action.primary:hover {
      border-color: rgba(88, 214, 230, 0.55);
      background: linear-gradient(180deg, #34d7f2, #18acd8);
      color: white;
    }

    .action:not(.primary):hover {
      background: var(--button);
      color: var(--text);
    }

    .switch:hover {
      background: var(--button-hover);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .switch[data-active="true"] {
      color: white;
      border-color: color-mix(in srgb, var(--projects) 42%, transparent);
      background: color-mix(in srgb, var(--projects) 12%, var(--button));
    }

    @media (prefers-color-scheme: light) {
      .switch:hover {
        background: rgba(12, 18, 26, 0.10);
        border-color: rgba(12, 18, 26, 0.22);
      }
    }

    .attribution {
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      text-align: center;
      margin-top: 6px;
    }

    .attribution a {
      color: inherit;
      text-decoration: none;
    }

    @media (prefers-color-scheme: light) {
      .attribution {
        color: rgba(12,18,26,0.30);
      }
    }




    .hide-codex [data-card="codex"] { display: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" data-card="claude" style="--accent: var(--claude)">
      <header class="brand">
        <img src="{{CLAUDE_ICON}}" alt="">
        <h1 data-i18n="claude_name">Claude Code</h1>
        <button class="switch" data-action="settings" data-i18n="settings">⚙ Settings</button>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="codex" style="--accent: var(--codex)">
      <header class="brand">
        <img src="{{CODEX_ICON}}" alt="">
        <h1 data-i18n="codex_name">Codex</h1>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="projects" style="--accent: var(--projects)">
      <header class="brand">
        <div class="brand-icon"><svg width="30" height="30" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4.75 8.25C4.75 7.14543 5.64543 6.25 6.75 6.25H10.5729C10.9737 6.25 11.3598 6.40073 11.6548 6.67228L12.9952 7.90522C13.2902 8.17677 13.6763 8.3275 14.0771 8.3275H19.25C20.3546 8.3275 21.25 9.22293 21.25 10.3275V17.75C21.25 18.8546 20.3546 19.75 19.25 19.75H6.75C5.64543 19.75 4.75 18.8546 4.75 17.75V8.25Z" stroke="var(--projects)" stroke-width="1.6" stroke-linejoin="round"/><path d="M7.25 11.25H18.75" stroke="var(--projects)" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/><path d="M8.75 14.15C8.75 13.4596 9.30964 12.9 10 12.9H10.3C10.9904 12.9 11.55 13.4596 11.55 14.15V16.5H8.75V14.15Z" fill="var(--projects)" opacity="0.18" stroke="var(--projects)" stroke-width="1.4"/><path d="M12.6 13.25C12.6 12.6425 13.0925 12.15 13.7 12.15H14.05C14.6575 12.15 15.15 12.6425 15.15 13.25V16.5H12.6V13.25Z" fill="var(--projects)" opacity="0.3" stroke="var(--projects)" stroke-width="1.4"/><path d="M16.2 14.85C16.2 14.1873 16.7373 13.65 17.4 13.65H17.75C18.4127 13.65 18.95 14.1873 18.95 14.85V16.5H16.2V14.85Z" fill="var(--projects)" opacity="0.48" stroke="var(--projects)" stroke-width="1.4"/></svg></div>
        <h1 data-i18n="projects_title">Project Usage</h1>
        <div class="project-actions">
          <button class="switch" data-action="toggle-project-range">Today</button>
          <button class="switch" data-action="analyze" data-i18n="analyze_usage">Analyze</button>
          <button class="switch" data-action="toggle-statusline" data-i18n="cli">CLI</button>
        </div>
      </header>
      <div data-project-list></div>
    </section>

    <section class="footer">
      <div class="meta">
        <div data-footer="rate">Rate: --</div>
        <div data-footer="status">Status: Loading</div>
      </div>
      <div class="today" data-footer="today">Today: $0.00 (0 tokens)</div>

      <div class="actions">
        <button class="action primary" data-action="refresh" data-i18n="refresh_now">↻ Refresh Now</button>
        <button class="action" data-action="quit" data-i18n="quit">⏻ Quit</button>
      </div>
    </section>
  </main>

  <script>
    const I18N = {{I18N_BUNDLE}};
    const FALLBACK_LANGUAGE = "en";
    const root = document.documentElement;
    let currentLanguage = "en";
    let projectRange = "1d";
    let latestState = null;

    function languageTable(language) {
      return I18N[language] || I18N[FALLBACK_LANGUAGE] || {};
    }

    function t(key, params = {}) {
      const template = languageTable(currentLanguage)[key] || languageTable(FALLBACK_LANGUAGE)[key] || key;
      return template.replace(/\{(\w+)\}/g, (_, name) => `${params[name] ?? ""}`);
    }

    function labels() {
      return {
        session: t("session_label"),
        weekly: t("weekly_label"),
      };
    }

    function projectRangeLabel(range) {
      if (range === "7d") return t("project_range_7d");
      if (range === "30d") return t("project_range_30d");
      if (range === "all") return t("project_range_all");
      return t("project_range_1d");
    }

    function applyStaticText() {
      document.documentElement.lang = currentLanguage === "zh-TW" ? "zh-Hant" : currentLanguage;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.dataset.i18n;
        if (key) node.textContent = t(key);
      });
      const rangeButton = document.querySelector('[data-action="toggle-project-range"]');
      if (rangeButton) rangeButton.textContent = projectRangeLabel(projectRange);
    }

    window.usageSetLanguage = function usageSetLanguage(language) {
      currentLanguage = I18N[language] ? language : FALLBACK_LANGUAGE;
      applyStaticText();
      if (latestState) {
        window.usageApplyState({ ...latestState, language: currentLanguage });
      }
    };

    function cssVar(name) {
      return getComputedStyle(root).getPropertyValue(name).trim();
    }

    function colorFor(percent, fallback) {
      if (typeof percent !== "number") return fallback;
      if (percent >= 80) return cssVar("--danger");
      if (percent >= 50) return cssVar("--warn");
      return fallback;
    }

    function renderRow(card, key, row) {
      const el = document.querySelector(`[data-card="${card}"] [data-row="${key}"]`);
      if (!el) return;
      const cardEl = el.closest(".card");
      if (!cardEl) return;
      const data = row || {
        percent: null,
        percentText: "--",
        resetText: t("reset_placeholder"),
        warning: false,
        available: false,
      };
      const available = data.available === true && typeof data.percent === "number";
      const accent = getComputedStyle(cardEl).getPropertyValue("--accent").trim();
      const color = colorFor(data.percent, accent);
      el.dataset.available = available ? "true" : "false";
      el.innerHTML = `
        <div class="row-head">
          <div class="row-title"></div>
          <div class="percent"></div>
        </div>
        <div class="track"><div class="fill"></div></div>
        <div class="reset"></div>
      `;
      const title = el.querySelector(".row-title");
      const percent = el.querySelector(".percent");
      const reset = el.querySelector(".reset");
      const fill = el.querySelector(".fill");
      if (!title || !percent || !reset || !fill) return;
      title.textContent = labels()[key];
      percent.textContent = data.percentText || "--";
      reset.textContent = data.resetText || t("reset_placeholder");
      reset.dataset.warning = data.warning === true ? "true" : "false";
      percent.style.color = available ? color : "";
      fill.style.width = available ? `${Math.max(0, Math.min(100, data.percent))}%` : "0%";
      fill.style.setProperty("--fill-color", color);
    }

    function applyCard(name, rows) {
      renderRow(name, "session", rows && rows.session);
      renderRow(name, "weekly", rows && rows.weekly);
    }

    function renderProjects(projects) {
      const list = document.querySelector('[data-project-list]');
      if (!list) return;
      const ranks = ["①", "②", "③"];
      const rows = (projects || []).slice(0, 3);
      const totalTokens = rows.reduce((s, p) => s + Math.max(0, Number(p.tokens) || 0), 0);
      list.replaceChildren();
      if (rows.length === 0) {
        const empty = document.createElement("div");
        empty.style.cssText = "color:var(--muted);font-size:13px;padding:8px 0";
        empty.textContent = t("projects_empty");
        list.append(empty);
        return;
      }
      rows.forEach((p, i) => {
        const tokens = Math.max(0, Number(p.tokens) || 0);
        const width = totalTokens > 0 ? Math.max(0, Math.min(100, (tokens / totalTokens) * 100)) : 0;
        const row = document.createElement("div");
        row.className = "proj-row";
        const rank = document.createElement("span");
        rank.className = "proj-rank";
        rank.textContent = ranks[i];
        const name = document.createElement("span");
        name.className = "proj-name";
        name.textContent = p.name || "";
        const tok = document.createElement("span");
        tok.className = "proj-tokens";
        tok.textContent = p.tokensText || "";
        const cost = document.createElement("span");
        cost.className = "proj-cost";
        cost.textContent = p.costText || "";
        const bar = document.createElement("div");
        bar.className = "proj-bar";
        const fill = document.createElement("div");
        fill.className = "proj-bar-fill";
        fill.style.width = `${width}%`;
        bar.append(fill);
        row.append(rank, name, tok, cost, bar);
        list.append(row);
      });
    }





    function renderStatusline(statusline) {
      const data = statusline || {};
      const button = document.querySelector('[data-action="toggle-statusline"]');
      if (button) {
        const enabled = data.enabled === true;
        button.dataset.active = enabled ? "true" : "false";
        button.textContent = enabled ? t("cli_enabled") : t("cli_disabled");
      }
    }

    window.usageApplyState = function usageApplyState(state) {
      document.documentElement.classList.toggle('hide-codex', !!state.hideCodex);
      currentLanguage = I18N[state.language] ? state.language : currentLanguage;
      applyStaticText();
      applyCard("claude", state.claude);
      applyCard("codex", state.codex);
      latestState = state;
      renderProjects(
        projectRange === "1d" ? state.projects
        : projectRange === "7d" ? state.projects7d
        : projectRange === "30d" ? state.projects30d
        : projectRange === "all" ? state.projectsAll
        : state.projects
      );
      renderStatusline(state.statusline || {});
      const rate = document.querySelector('[data-footer="rate"]');
      const status = document.querySelector('[data-footer="status"]');
      const today = document.querySelector('[data-footer="today"]');
      if (rate) rate.textContent = state.footer.rate || t("rate_text", { value: "--" });
      if (status) status.textContent = state.footer.status || t("status_text", { value: "--" });
      if (today) today.textContent = state.footer.today || t("today_text", { cost: "0.00", tokens: "0" });
    };

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      if (button.dataset.action === "toggle-project-range") {
        projectRange = projectRange === "1d" ? "7d" : projectRange === "7d" ? "30d" : projectRange === "30d" ? "all" : "1d";
        button.textContent = projectRangeLabel(projectRange);
        if (latestState) {
          renderProjects(
            projectRange === "1d" ? latestState.projects
            : projectRange === "7d" ? latestState.projects7d
            : projectRange === "30d" ? latestState.projects30d
            : projectRange === "all" ? latestState.projectsAll
            : latestState.projects
          );
        }
        return;
      }
      const bridge = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.usage;
      if (bridge && typeof bridge.postMessage === "function") {
        bridge.postMessage(button.dataset.action);
      }
    });

    window.usageApplyState({
      language: "en",
      claude: { session: {}, weekly: {} },
      codex: { session: {}, weekly: {} },
      projects: [],
      projects7d: [],
      projects30d: [],
      projectsAll: [],
      statusline: {},
      footer: { rate: "Rate: --", status: "Status: Loading", today: "Today: $0.00 (0 tokens)", showInstall: false }
    });
  </script>
</body>
</html>
