<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --sky-top: #eaf6ff;
      --sky-bottom: #cfdeef;
      --surface: rgba(255, 255, 255, 0.54);
      --surface-strong: rgba(255, 255, 255, 0.74);
      --surface-line: rgba(103, 132, 156, 0.22);
      --text: #1b374c;
      --muted: #627f95;
      --muted-strong: #48677d;
      --claude: linear-gradient(90deg, #f8bc8b 0%, #f4a261 50%, #df8b49 100%);
      --codex: linear-gradient(90deg, #8ce7ff 0%, #54bfe3 50%, #3895be 100%);
      --projects: linear-gradient(90deg, #dcecff 0%, #9cc1ed 50%, #6e97cf 100%);
      --warn: #d08b3d;
      --danger: #c76854;
      --tick: rgba(255, 255, 255, 0.42);
      --shadow: 0 22px 44px rgba(119, 150, 178, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #b8d6f0 0%, #d5e7f6 46%, #eaf3fb 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior: none;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.34), transparent 32%, rgba(255, 255, 255, 0.2) 100%);
      opacity: 0.8;
    }

    body::after {
      background:
        radial-gradient(circle at 16% 20%, rgba(255, 255, 255, 0.32), transparent 22%),
        radial-gradient(circle at 78% 12%, rgba(255, 255, 255, 0.22), transparent 18%),
        radial-gradient(circle at 62% 64%, rgba(255, 255, 255, 0.18), transparent 20%);
      opacity: 0.55;
    }

    @keyframes driftA {
      from { transform: translate3d(-2px, -2px, 0); }
      to { transform: translate3d(2px, 2px, 0); }
    }

    @keyframes driftB {
      from { transform: translate3d(-2px, 0, 0); }
      to { transform: translate3d(2px, 4px, 0); }
    }

    .viewport {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 10px;
      overflow: hidden;
      isolation: isolate;
    }

    .sky,
    .contours {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .sky {
      z-index: 0;
    }

    .contours {
      z-index: 1;
      opacity: 0.95;
    }

    .cloud-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      animation: driftA 10s ease-in-out infinite alternate;
    }

    .cloud-layer.back {
      opacity: 0.82;
      animation-duration: 12s;
    }

    .cloud-layer.front {
      opacity: 0.96;
      animation-name: driftB;
      animation-duration: 9s;
    }

    .cloud-shape {
      fill: rgba(255, 255, 255, 0.95);
    }

    .cloud-shape.soft {
      fill: rgba(255, 255, 255, 0.75);
    }

    .cloud-highlight {
      fill: rgba(255, 255, 255, 0.9);
    }

    .contour-line {
      fill: none;
      stroke: rgba(80, 120, 160, 0.36);
      stroke-width: 0.9;
    }

    .contour-line.light {
      stroke: rgba(255, 255, 255, 0.54);
      stroke-width: 0.7;
    }

    .haze {
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: -4%;
      height: 22%;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.34)),
        radial-gradient(ellipse at 22% 40%, rgba(255, 255, 255, 0.54) 0 22%, transparent 52%),
        radial-gradient(ellipse at 58% 45%, rgba(255, 255, 255, 0.5) 0 22%, transparent 54%),
        radial-gradient(ellipse at 84% 35%, rgba(255, 255, 255, 0.42) 0 20%, transparent 50%);
      filter: blur(24px);
      opacity: 0.9;
      z-index: 1;
    }

    .wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      height: 100%;
    }

    .card,
    .footer {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.55);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.35), rgba(234, 244, 251, 0.3));
      box-shadow: var(--shadow);
      border-radius: 24px;
      backdrop-filter: blur(18px) saturate(1.1);
      -webkit-backdrop-filter: blur(18px) saturate(1.1);
    }

    .card::before,
    .footer::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 40%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.5), transparent 32%);
      pointer-events: none;
    }

    .card {
      padding: 12px 14px;
    }

    .card[data-card="claude"],
    .card[data-card="codex"] {
      min-height: 210px;
      padding: 10px 14px;
    }

    .card[data-card="claude"] .header,
    .card[data-card="codex"] .header {
      margin-bottom: 8px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .header img,
    .weather-badge {
      width: 28px;
      height: 28px;
      flex: none;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.46);
    }

    .weather-badge {
      display: grid;
      place-items: center;
      border: 1px solid rgba(109, 139, 162, 0.14);
    }

    .weather-badge svg {
      width: 20px;
      height: 20px;
      stroke: var(--muted-strong);
    }

    .header-copy {
      min-width: 0;
      flex: 1;
    }

    .header h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card[data-card="projects"] .header {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      align-items: center;
      height: auto;
      column-gap: 10px;
      row-gap: 10px;
    }

    .card[data-card="projects"] .weather-badge {
      grid-column: 1;
      grid-row: 1;
      justify-self: start;
    }

    .card[data-card="projects"] .header-copy {
      grid-column: 2;
      grid-row: 1;
      min-width: 0;
    }

    .card[data-card="projects"] h1 {
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
    }

    .card[data-card="projects"] .range-chip {
      grid-column: 1 / 3;
      grid-row: 2;
      width: calc((100% - 16px) / 3);
    }

    .card[data-card="projects"] .range-chip:nth-of-type(1) {
      justify-self: start;
    }

    .card[data-card="projects"] .range-chip:nth-of-type(2) {
      justify-self: center;
    }

    .card[data-card="projects"] .range-chip:nth-of-type(3) {
      justify-self: end;
    }

    .switch {
      flex: none;
      min-height: 28px;
      padding: 0 12px;
      border: 1px solid rgba(97, 128, 151, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .switch:active,
    .action:active,
    .range-chip:active {
      transform: translateY(1px);
    }

    .row {
      position: relative;
      padding: 10px 0 0;
    }

    .card[data-card="claude"] .row,
    .card[data-card="codex"] .row {
      padding-top: 8px;
    }

    .row + .row {
      margin-top: 10px;
      border-top: 1px solid rgba(103, 132, 156, 0.14);
    }

    .card[data-card="claude"] .row + .row,
    .card[data-card="codex"] .row + .row {
      margin-top: 8px;
    }

    .row-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .row-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted-strong);
      letter-spacing: 0.02em;
    }

    .percent {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .track {
      position: relative;
      height: 16px;
      padding: 2px;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(109, 139, 162, 0.16);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(218, 231, 242, 0.65)),
        rgba(255, 255, 255, 0.4);
      box-shadow: inset 0 2px 6px rgba(126, 154, 178, 0.1);
    }

    .track::before {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 calc(10% - 1px),
          var(--tick) calc(10% - 1px) 10%
        );
      opacity: 0.9;
      pointer-events: none;
      z-index: 2;
    }

    .fill {
      position: relative;
      z-index: 1;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.38),
        0 0 18px rgba(255, 255, 255, 0.2);
      transition: width 160ms ease-out, background 160ms ease-out;
    }

    .reset {
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .reset[data-warning="true"] {
      color: var(--danger);
      font-weight: 600;
    }

    .row[data-available="false"] .percent,
    .row[data-available="false"] .reset {
      color: var(--muted);
    }

    .projects-card {
      padding-bottom: 12px;
    }

    .range-chip {
      min-height: 28px;
      padding: 0 12px;
      border: 1px solid rgba(97, 128, 151, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .proj-row {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 8px 0 11px;
      border-top: 1px solid rgba(103, 132, 156, 0.14);
    }

    .proj-row:first-child {
      border-top: none;
    }

    .proj-topline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .proj-rank {
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted-strong);
      font-size: 11px;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(109, 139, 162, 0.14);
      flex: none;
    }

    .proj-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 600;
    }

    .proj-tokens {
      align-self: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted-strong);
      white-space: nowrap;
    }

    .proj-cost {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .empty-state {
      padding: 12px 4px 2px;
      color: var(--muted);
      font-size: 13px;
    }

    .footer {
      padding: 12px 14px;
    }

    .meta {
      display: grid;
      gap: 4px;
      font-size: 12px;
      line-height: 1.15;
      color: var(--muted-strong);
    }

    .today {
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px solid rgba(103, 132, 156, 0.14);
      font-size: 13px;
      line-height: 1.15;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .action {
      flex: 1;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(97, 128, 151, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .action.primary {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(225, 239, 250, 0.9));
    }

    .action.primary:hover {
      background: linear-gradient(180deg, #ffffff, color-mix(in srgb, var(--muted-strong) 20%, rgba(225, 239, 250, 0.94)));
      border-color: rgba(97, 128, 151, 0.3);
    }

    .action:not(.primary):hover {
      background: var(--surface-strong);
      color: var(--text);
    }

    .switch:hover,
    .range-chip:hover {
      background: color-mix(in srgb, var(--muted-strong) 10%, var(--surface-strong));
      border-color: rgba(97, 128, 151, 0.32);
    }

    .range-chip[data-active="true"] {
      background: color-mix(in srgb, var(--muted-strong) 18%, var(--surface-strong));
      color: var(--text);
    }

    .action[data-action="install"] {
      display: none;
    }

    .footer .action[data-action="settings"] {
      display: none;
    }

    .action[data-action="install"][data-visible="true"] {
      display: inline-block;
      flex: 1;
    }


    .hide-codex [data-card="codex"] { display: none; }
  </style>
</head>
<body>

    <div class="haze"></div>

    <main class="wrap">
      <section class="card" data-card="claude" style="--accent: var(--claude)">
        <header class="header">
          <img src="{{CLAUDE_ICON}}" alt="">
          <div class="header-copy">
            <h1 data-i18n="claude_name">Claude Code</h1>
          </div>
          <button class="switch" data-action="settings" data-i18n="settings">Settings</button>
        </header>
        <div class="row" data-row="session"></div>
        <div class="row" data-row="weekly"></div>
      </section>

      <section class="card" data-card="codex" style="--accent: var(--codex)">
        <header class="header">
          <img src="{{CODEX_ICON}}" alt="">
          <div class="header-copy">
            <h1 data-i18n="codex_name">Codex</h1>
          </div>
        </header>
        <div class="row" data-row="session"></div>
        <div class="row" data-row="weekly"></div>
      </section>

      <section class="card projects-card" data-card="projects" style="--accent: var(--projects)">
        <header class="header">
          <div class="weather-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 15.25C5.20507 15.25 3.75 13.7949 3.75 12C3.75 10.2982 5.05894 8.90208 6.72406 8.7632C7.48026 6.56686 9.56402 5 12.0145 5C15.1096 5 17.618 7.5084 17.618 10.6035L17.6148 10.7387C18.8614 10.9864 19.8 12.0849 19.8 13.4041C19.8 14.9056 18.5828 16.1228 17.0813 16.1228H7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="header-copy">
            <h1 data-i18n="projects_title">Project Usage</h1>
          </div>
          <button class="range-chip" data-action="toggle-project-range">Today</button>
          <button class="range-chip" data-action="analyze" data-i18n="analyze_usage">Analyze</button>
          <button class="range-chip" data-action="toggle-statusline" data-i18n="cli">CLI</button>
        </header>
        <div data-project-list></div>
      </section>

      <section class="footer">
        <div class="meta">
          <div data-footer="rate">Rate: --</div>
          <div data-footer="status">Status: Loading</div>
        </div>
        <div class="today" data-footer="today">Today: $0.00 (0 tokens)</div>
        <div class="actions">
          <button class="action primary" data-action="refresh" data-i18n="refresh_now">Refresh</button>
          <button class="action" data-action="settings" data-i18n="settings">Settings</button>
          <button class="action" data-action="quit" data-i18n="quit">Quit</button>
          <button class="action" data-action="install" data-i18n="install_hook">Install Hook</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const I18N = {{I18N_BUNDLE}};
    const FALLBACK_LANGUAGE = "en";
    const root = document.documentElement;
    let currentLanguage = "en";
    let projectRange = "1d";
    let latestState = null;

    function languageTable(language) {
      return I18N[language] || I18N[FALLBACK_LANGUAGE] || {};
    }

    function t(key, params = {}) {
      const template = languageTable(currentLanguage)[key] || languageTable(FALLBACK_LANGUAGE)[key] || key;
      return template.replace(/\{(\w+)\}/g, (_, name) => `${params[name] ?? ""}`);
    }

    function labels() {
      return {
        session: t("session_label"),
        weekly: t("weekly_label"),
      };
    }

    function projectRangeLabel(range) {
      if (range === "7d") return t("project_range_7d");
      if (range === "30d") return t("project_range_30d");
      if (range === "all") return t("project_range_all");
      return t("project_range_1d");
    }

    function applyStaticText() {
      document.documentElement.lang = currentLanguage === "zh-TW" ? "zh-Hant" : currentLanguage;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.dataset.i18n;
        if (key) node.textContent = t(key);
      });
      const rangeButton = document.querySelector('[data-action="toggle-project-range"]');
      if (rangeButton) rangeButton.textContent = projectRangeLabel(projectRange);
    }

    window.usageSetLanguage = function usageSetLanguage(language) {
      currentLanguage = I18N[language] ? language : FALLBACK_LANGUAGE;
      applyStaticText();
      if (latestState) {
        window.usageApplyState({ ...latestState, language: currentLanguage });
      }
    };

    function cssVar(name) {
      return getComputedStyle(root).getPropertyValue(name).trim();
    }

    function colorFor(percent, fallback) {
      if (typeof percent !== "number") return fallback;
      if (percent >= 80) return cssVar("--danger");
      if (percent >= 50) return cssVar("--warn");
      return fallback;
    }

    function renderRow(card, key, row) {
      const el = document.querySelector(`[data-card="${card}"] [data-row="${key}"]`);
      if (!el) return;
      const cardEl = el.closest(".card");
      if (!cardEl) return;
      const data = row || {
        percent: null,
        percentText: "--",
        resetText: t("reset_placeholder"),
        warning: false,
        available: false,
      };
      const available = data.available === true && typeof data.percent === "number";
      const accent = getComputedStyle(cardEl).getPropertyValue("--accent").trim();
      const color = colorFor(data.percent, accent);
      el.dataset.available = available ? "true" : "false";
      el.innerHTML = `
        <div class="row-head">
          <div class="row-title"></div>
          <div class="percent"></div>
        </div>
        <div class="track"><div class="fill"></div></div>
        <div class="reset"></div>
      `;
      const title = el.querySelector(".row-title");
      const percent = el.querySelector(".percent");
      const reset = el.querySelector(".reset");
      const fill = el.querySelector(".fill");
      if (!title || !percent || !reset || !fill) return;
      title.textContent = labels()[key];
      percent.textContent = data.percentText || "--";
      reset.textContent = data.resetText || t("reset_placeholder");
      reset.dataset.warning = data.warning === true ? "true" : "false";
      percent.style.color = available ? color : "";
      fill.style.width = available ? `${Math.max(0, Math.min(100, data.percent))}%` : "0%";
      fill.style.background = color;
    }

    function applyCard(name, rows) {
      renderRow(name, "session", rows && rows.session);
      renderRow(name, "weekly", rows && rows.weekly);
    }

    function renderProjects(projects) {
      const list = document.querySelector("[data-project-list]");
      if (!list) return;
      const rows = (projects || []).slice(0, 3);
      list.replaceChildren();
      if (rows.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = t("projects_empty");
        list.append(empty);
        return;
      }
      rows.forEach((project, index) => {
        const row = document.createElement("div");
        row.className = "proj-row";
        const topline = document.createElement("div");
        topline.className = "proj-topline";
        const rank = document.createElement("span");
        rank.className = "proj-rank";
        rank.textContent = `${index + 1}`;
        const name = document.createElement("span");
        name.className = "proj-name";
        name.textContent = project.name || "";
        topline.append(rank, name);
        const tok = document.createElement("span");
        tok.className = "proj-tokens";
        tok.textContent = project.tokensText || "";
        const cost = document.createElement("span");
        cost.className = "proj-cost";
        cost.textContent = project.costText || "";
        row.append(topline, tok, cost);
        list.append(row);
      });
    }

    function applyFooter(footer) {
      const rate = document.querySelector('[data-footer="rate"]');
      const status = document.querySelector('[data-footer="status"]');
      const today = document.querySelector('[data-footer="today"]');
      const install = document.querySelector('[data-action="install"]');
      if (rate) rate.textContent = footer.rate || t("rate_text", { value: "--" });
      if (status) status.textContent = footer.status || t("status_text", { value: "--" });
      if (today) today.textContent = footer.today || t("today_text", { cost: "0.00", tokens: "0" });
      if (install) install.dataset.visible = footer.showInstall === true ? "true" : "false";
    }





    function renderStatusline(statusline) {
      const data = statusline || {};
      const button = document.querySelector('[data-action="toggle-statusline"]');
      if (button) {
        const enabled = data.enabled === true;
        button.dataset.active = enabled ? "true" : "false";
        button.textContent = enabled ? t("cli_enabled") : t("cli_disabled");
      }
    }

    window.usageApplyState = function usageApplyState(state) {
      document.documentElement.classList.toggle('hide-codex', !!state.hideCodex);
      currentLanguage = I18N[state.language] ? state.language : currentLanguage;
      applyStaticText();
      applyCard("claude", state.claude);
      applyCard("codex", state.codex);
      latestState = state;
      renderProjects(
        projectRange === "1d" ? state.projects
        : projectRange === "7d" ? state.projects7d
        : projectRange === "30d" ? state.projects30d
        : projectRange === "all" ? state.projectsAll
        : state.projects
      );
      renderStatusline(state.statusline || {});
      applyFooter(state.footer || {});
    };

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      if (button.dataset.action === "toggle-project-range") {
        projectRange = projectRange === "1d" ? "7d" : projectRange === "7d" ? "30d" : projectRange === "30d" ? "all" : "1d";
        button.textContent = projectRangeLabel(projectRange);
        if (latestState) {
          renderProjects(
            projectRange === "1d" ? latestState.projects
            : projectRange === "7d" ? latestState.projects7d
            : projectRange === "30d" ? latestState.projects30d
            : projectRange === "all" ? latestState.projectsAll
            : latestState.projects
          );
        }
        return;
      }
      const bridge = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.usage;
      if (bridge && typeof bridge.postMessage === "function") {
        bridge.postMessage(button.dataset.action);
      }
    });

    window.usageApplyState({
      language: "en",
      claude: { session: {}, weekly: {} },
      codex: { session: {}, weekly: {} },
      projects: [],
      projects7d: [],
      projects30d: [],
      projectsAll: [],
      statusline: {},
      footer: { rate: "Rate: --", status: "Status: Loading", today: "Today: $0.00 (0 tokens)", showInstall: false }
    });
  </script>
</body>
</html>
