<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --panel: rgba(0, 20, 8, 0.88);
      --panel-border: rgba(0, 220, 90, 0.35);
      --line: rgba(0, 220, 90, 0.18);
      --text: #2ef272;
      --muted: rgba(46, 242, 114, 0.55);
      --track: rgba(0, 140, 50, 0.35);
      --button: rgba(0, 0, 0, 0.72);
      --button-border: rgba(0, 220, 90, 0.45);
      --accent: #2ef272;
      --danger: #ff453a;
      --warn: #ffc439;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Courier New", "SF Mono", Menlo, monospace;
      overscroll-behavior: none;
    }

    body {
      position: relative;
      padding: 14px;
    }

    canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .card,
    .footer {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow:
        inset 0 1px 0 rgba(46, 242, 114, 0.08),
        0 0 18px rgba(0, 220, 90, 0.08);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    .card {
      padding: 16px 18px 14px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      min-height: 32px;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand img {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      object-fit: cover;
      flex: none;
      filter: grayscale(1) brightness(1.2) sepia(1) hue-rotate(68deg) saturate(5);
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
      overflow: hidden;
    }

    .brand-icon svg {
      display: block;
      width: 30px;
      height: 30px;
      flex: none;
    }

    .brand h1 {
      margin: 0;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-shadow: 0 0 8px rgba(46, 242, 114, 0.26);
    }

    .card[data-card="projects"] .brand {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      align-items: center;
      min-height: 0;
      row-gap: 10px;
      margin-bottom: 14px;
    }

    .card[data-card="projects"] .brand-icon {
      grid-column: 1;
    }

    .card[data-card="projects"] .brand h1 {
      grid-column: 2;
    }

    .project-actions {
      grid-column: 1 / 3;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .project-actions .switch {
      width: 100%;
      min-width: 0;
      padding: 0 4px;
    }

    .switch {
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--button-border);
      border-radius: 9px;
      background: var(--button);
      color: var(--text);
      font: 700 12px/26px "Courier New", "SF Mono", Menlo, monospace;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .row + .row {
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 10px;
    }

    .row-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .row-title {
      font-size: 15px;
      line-height: 18px;
      font-weight: 700;
    }

    .percent {
      font-size: 13px;
      line-height: 18px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .track {
      height: 8px;
      border-radius: 99px;
      overflow: hidden;
      background: var(--track);
      box-shadow: inset 0 0 0 1px rgba(0, 220, 90, 0.1);
    }

    .fill {
      width: 0%;
      height: 100%;
      min-width: 0;
      border-radius: inherit;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(46, 242, 114, 0.38);
      transition: width 140ms ease-out, background-color 140ms ease-out;
    }

    .reset {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 13px;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    .reset[data-warning="true"] {
      color: #ff6b6b;
      text-shadow: 0 0 6px rgba(255, 107, 107, 0.45);
    }

    .row[data-available="false"] .percent,
    .row[data-available="false"] .reset {
      color: var(--muted);
    }

    .row[data-available="false"] .fill {
      width: 0%;
    }

    .proj-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px;
      padding: 7px 0;
      border-top: 1px solid var(--line);
      font-size: 13.5px;
      line-height: 18px;
    }

    .proj-row:first-child {
      border-top: none;
    }

    .card[data-card="projects"] [data-project-list] {
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .card[data-card="projects"] [data-project-list] .proj-row:last-child {
      padding-bottom: 4px;
    }

    .proj-rank {
      width: 16px;
      color: var(--muted);
      font-weight: 700;
      flex: none;
    }

    .proj-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .proj-tokens {
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }

    .proj-cost {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .proj-bar {
      flex: 0 0 100%;
      width: 100%;
      height: 3px;
      margin-top: 6px;
      align-self: end;
      overflow: hidden;
      border-radius: 2px;
      background: rgba(0, 140, 50, 0.2);
    }

    .proj-bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 72%, transparent), var(--accent));
      opacity: 0.7;
    }

    .proj-row:first-child .proj-bar {
      height: 3.5px;
    }

    .proj-row:first-child .proj-bar-fill {
      opacity: 1;
    }

    .proj-row:last-child .proj-bar {
      margin-bottom: 10px;
    }

    .footer {
      flex: 1;
      min-height: 0;
      padding: 14px 18px 18px;
    }

    .meta {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13.5px;
      line-height: 18px;
      font-weight: 700;
    }

    .today {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      color: var(--text);
      font-size: 15px;
      line-height: 20px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 14px;
      padding: 0 14px;
    }

    .action {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      border: 1px solid var(--button-border);
      border-radius: 8px;
      background: var(--button);
      color: var(--text);
      font: 700 13px/1 "Courier New", "SF Mono", Menlo, monospace;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex: 1;
    }

    .action,
    .switch {
      transition: filter 80ms ease-out, transform 80ms ease-out, box-shadow 120ms ease-out;
    }

    .action:hover,
    .switch:hover {
      box-shadow: 0 0 12px rgba(46, 242, 114, 0.18);
    }

    .action.primary:hover {
      background: color-mix(in srgb, var(--accent) 24%, var(--button));
      border-color: var(--accent);
      box-shadow: 0 0 16px rgba(46, 242, 114, 0.28);
    }

    .action:not(.primary):hover {
      background: color-mix(in srgb, var(--accent) 10%, var(--button));
      color: var(--text);
    }

    .switch:hover {
      background: color-mix(in srgb, var(--accent) 10%, var(--button));
      border-color: color-mix(in srgb, var(--accent) 60%, var(--button-border));
    }

    .switch[data-active="true"] {
      background: color-mix(in srgb, var(--accent) 18%, var(--button));
      color: #000;
      border-color: var(--accent);
    }

    .action:active,
    .switch:active {
      filter: brightness(0.82);
      transform: scale(0.98);
    }

    .attribution {
      font-size: 10px;
      color: rgba(46, 242, 114, 0.25);
      text-align: center;
      margin-top: 6px;
    }

    .attribution a {
      color: inherit;
      text-decoration: none;
    }


    .hide-codex [data-card="codex"] { display: none; }
  </style>
</head>
<body>
  <canvas id="matrix-rain" aria-hidden="true"></canvas>

  <main class="wrap">
    <section class="card" data-card="claude">
      <header class="brand">
        <img src="{{CLAUDE_ICON}}" alt="">
        <h1 data-i18n="claude_name"></h1>
        <button class="switch" data-action="settings">[ SWITCH ]</button>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="codex">
      <header class="brand">
        <img src="{{CODEX_ICON}}" alt="">
        <h1 data-i18n="codex_name"></h1>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="projects">
      <header class="brand">
        <div class="brand-icon"><svg width="30" height="30" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4.75 8.25C4.75 7.14543 5.64543 6.25 6.75 6.25H10.5729C10.9737 6.25 11.3598 6.40073 11.6548 6.67228L12.9952 7.90522C13.2902 8.17677 13.6763 8.3275 14.0771 8.3275H19.25C20.3546 8.3275 21.25 9.22293 21.25 10.3275V17.75C21.25 18.8546 20.3546 19.75 19.25 19.75H6.75C5.64543 19.75 4.75 18.8546 4.75 17.75V8.25Z" stroke="var(--accent)" stroke-width="1.6" stroke-linejoin="round"/><path d="M7.25 11.25H18.75" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/><path d="M8.75 14.15C8.75 13.4596 9.30964 12.9 10 12.9H10.3C10.9904 12.9 11.55 13.4596 11.55 14.15V16.5H8.75V14.15Z" fill="var(--accent)" opacity="0.18" stroke="var(--accent)" stroke-width="1.4"/><path d="M12.6 13.25C12.6 12.6425 13.0925 12.15 13.7 12.15H14.05C14.6575 12.15 15.15 12.6425 15.15 13.25V16.5H12.6V13.25Z" fill="var(--accent)" opacity="0.3" stroke="var(--accent)" stroke-width="1.4"/><path d="M16.2 14.85C16.2 14.1873 16.7373 13.65 17.4 13.65H17.75C18.4127 13.65 18.95 14.1873 18.95 14.85V16.5H16.2V14.85Z" fill="var(--accent)" opacity="0.48" stroke="var(--accent)" stroke-width="1.4"/></svg></div>
        <h1 data-i18n="projects_title"></h1>
        <div class="project-actions">
          <button class="switch" data-action="toggle-project-range"></button>
          <button class="switch" data-action="analyze" data-i18n="analyze_usage">[ ANALYZE ]</button>
          <button class="switch" data-action="toggle-statusline" data-i18n="cli">CLI</button>
        </div>
      </header>
      <div data-project-list></div>
    </section>

    <section class="footer">
      <div class="meta">
        <div data-footer="rate"></div>
        <div data-footer="status"></div>
      </div>
      <div class="today" data-footer="today"></div>

      <div class="actions">
        <button class="action" data-action="refresh">[ REFRESH ]</button>
        <button class="action" data-action="quit">[ EXIT ]</button>
      </div>
    </section>
  </main>

  <script>
    const I18N = {{I18N_BUNDLE}};
    const FALLBACK_LANGUAGE = "en";
    const MATRIX_GREEN = "#2ef272";
    const MATRIX_CHARS = "ｦｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃ0123456789";
    const MATRIX_COLUMNS = 26;
    const COLUMN_WIDTH = 14;
    const TRAIL_LENGTH = 10;
    const MIN_SPEED = 2.0;
    const MAX_SPEED = 4.0;
    const GLYPH_HEIGHT = 14;
    const root = document.documentElement;
    const canvas = document.getElementById("matrix-rain");
    const ctx = canvas.getContext("2d");
    let currentLanguage = "en";
    let projectRange = "1d";
    let latestState = null;
    let logicalWidth = 0;
    let logicalHeight = 0;
    let columns = [];

    function randomChar() {
      return MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
    }

    function randomSpeed() {
      return MIN_SPEED + (Math.random() * (MAX_SPEED - MIN_SPEED));
    }

    function createColumn(index) {
      return {
        x: 0,
        speed: randomSpeed(),
        y: Math.random() * -logicalHeight,
        lastStep: -1,
        glyphs: Array.from({ length: TRAIL_LENGTH }, randomChar),
        index,
      };
    }

    function updateColumnPositions() {
      const totalWidth = MATRIX_COLUMNS * COLUMN_WIDTH;
      const offsetX = Math.max(0, Math.floor((logicalWidth - totalWidth) / 2));
      columns.forEach((column, index) => {
        column.index = index;
        column.x = offsetX + (index * COLUMN_WIDTH);
      });
    }

    function resetCanvas() {
      const rect = document.body.getBoundingClientRect();
      logicalWidth = Math.max(1, Math.round(rect.width));
      logicalHeight = Math.max(1, Math.round(rect.height));
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(logicalWidth * dpr));
      canvas.height = Math.max(1, Math.round(logicalHeight * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.font = "14px 'Courier New', 'SF Mono', Menlo, monospace";
      ctx.textBaseline = "top";
      ctx.clearRect(0, 0, logicalWidth, logicalHeight);
      if (columns.length === 0) {
        columns = Array.from({ length: MATRIX_COLUMNS }, (_, index) => createColumn(index));
      }
      updateColumnPositions();
    }

    function drawRain() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
      ctx.fillRect(0, 0, logicalWidth, logicalHeight);
      columns.forEach((column) => {
        column.y += column.speed;
        const step = Math.floor(column.y / GLYPH_HEIGHT);
        if (step > column.lastStep) {
          const delta = step - column.lastStep;
          for (let i = 0; i < delta; i += 1) {
            column.glyphs.unshift(randomChar());
          }
          column.glyphs = column.glyphs.slice(0, TRAIL_LENGTH);
          column.lastStep = step;
        }
        for (let i = 0; i < TRAIL_LENGTH; i += 1) {
          const y = column.y - (i * GLYPH_HEIGHT);
          if (y < -GLYPH_HEIGHT || y > logicalHeight) continue;
          const alpha = i === 0 ? 1.0 : 1 - ((i / (TRAIL_LENGTH - 1)) * 0.95);
          ctx.fillStyle = `rgba(46, 242, 114, ${alpha.toFixed(3)})`;
          ctx.fillText(column.glyphs[i] || randomChar(), column.x, y);
        }
        if ((column.y - ((TRAIL_LENGTH - 1) * GLYPH_HEIGHT)) > logicalHeight + GLYPH_HEIGHT) {
          column.y = (-Math.random() * logicalHeight) - (TRAIL_LENGTH * GLYPH_HEIGHT);
          column.speed = randomSpeed();
          column.lastStep = Math.floor(column.y / GLYPH_HEIGHT);
          column.glyphs = Array.from({ length: TRAIL_LENGTH }, randomChar);
        }
      });
      window.requestAnimationFrame(drawRain);
    }

    function languageTable(language) {
      return I18N[language] || I18N[FALLBACK_LANGUAGE] || {};
    }

    function t(key, params = {}) {
      const template = languageTable(currentLanguage)[key] || languageTable(FALLBACK_LANGUAGE)[key] || key;
      return template.replace(/\{(\w+)\}/g, (_, name) => `${params[name] ?? ""}`);
    }

    function labels() {
      return {
        session: t("session_label"),
        weekly: t("weekly_label"),
      };
    }

    function projectRangeLabel(range) {
      if (range === "7d") return t("project_range_7d");
      if (range === "30d") return t("project_range_30d");
      if (range === "all") return t("project_range_all");
      return t("project_range_1d");
    }

    function applyStaticText() {
      document.documentElement.lang = currentLanguage === "zh-TW" ? "zh-Hant" : currentLanguage;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.dataset.i18n;
        if (key) node.textContent = t(key);
      });
      const rangeButton = document.querySelector('[data-action="toggle-project-range"]');
      if (rangeButton) rangeButton.textContent = projectRangeLabel(projectRange);
    }

    window.usageSetLanguage = function usageSetLanguage(language) {
      currentLanguage = I18N[language] ? language : FALLBACK_LANGUAGE;
      applyStaticText();
      if (latestState) {
        window.usageApplyState({ ...latestState, language: currentLanguage });
      }
    };

    function cssVar(name) {
      return getComputedStyle(root).getPropertyValue(name).trim();
    }

    function colorFor(percent, fallback) {
      if (typeof percent !== "number") return fallback;
      if (percent >= 80) return cssVar("--danger");
      if (percent >= 50) return cssVar("--warn");
      return fallback;
    }

    function renderRow(card, key, row) {
      const el = document.querySelector(`[data-card="${card}"] [data-row="${key}"]`);
      if (!el) return;
      const cardEl = el.closest(".card");
      if (!cardEl) return;
      const data = row || {
        percent: null,
        percentText: "--",
        resetText: t("reset_placeholder"),
        warning: false,
        available: false,
      };
      const available = data.available === true && typeof data.percent === "number";
      const accent = getComputedStyle(cardEl).getPropertyValue("--accent").trim() || MATRIX_GREEN;
      const color = colorFor(data.percent, accent);
      el.dataset.available = available ? "true" : "false";
      el.innerHTML = `
        <div class="row-head">
          <div class="row-title"></div>
          <div class="percent"></div>
        </div>
        <div class="track"><div class="fill"></div></div>
        <div class="reset"></div>
      `;
      const title = el.querySelector(".row-title");
      const percent = el.querySelector(".percent");
      const reset = el.querySelector(".reset");
      const fill = el.querySelector(".fill");
      if (!title || !percent || !reset || !fill) return;
      title.textContent = labels()[key];
      percent.textContent = data.percentText || "--";
      reset.textContent = data.resetText || t("reset_placeholder");
      reset.dataset.warning = data.warning === true ? "true" : "false";
      percent.style.color = available ? color : "";
      fill.style.width = available ? `${Math.max(0, Math.min(100, data.percent))}%` : "0%";
      fill.style.background = color;
    }

    function applyCard(name, rows) {
      renderRow(name, "session", rows && rows.session);
      renderRow(name, "weekly", rows && rows.weekly);
    }

    function renderProjects(projects) {
      const list = document.querySelector("[data-project-list]");
      if (!list) return;
      const ranks = ["①", "②", "③"];
      const rows = (projects || []).slice(0, 3);
      const totalTokens = rows.reduce((s, p) => s + Math.max(0, Number(p.tokens) || 0), 0);
      list.replaceChildren();
      if (rows.length === 0) {
        const empty = document.createElement("div");
        empty.style.cssText = "color:var(--muted);font-size:13px;padding:8px 0";
        empty.textContent = t("projects_empty");
        list.append(empty);
        return;
      }
      rows.forEach((project, index) => {
        const tokens = Math.max(0, Number(project.tokens) || 0);
        const width = totalTokens > 0 ? Math.max(0, Math.min(100, (tokens / totalTokens) * 100)) : 0;
        const row = document.createElement("div");
        row.className = "proj-row";
        const rank = document.createElement("span");
        rank.className = "proj-rank";
        rank.textContent = ranks[index];
        const name = document.createElement("span");
        name.className = "proj-name";
        name.textContent = project.name || "";
        const tok = document.createElement("span");
        tok.className = "proj-tokens";
        tok.textContent = project.tokensText || "";
        const cost = document.createElement("span");
        cost.className = "proj-cost";
        cost.textContent = project.costText || "";
        const bar = document.createElement("div");
        bar.className = "proj-bar";
        const fill = document.createElement("div");
        fill.className = "proj-bar-fill";
        fill.style.width = `${width}%`;
        bar.append(fill);
        row.append(rank, name, tok, cost, bar);
        list.append(row);
      });
    }





    function renderStatusline(statusline) {
      const data = statusline || {};
      const button = document.querySelector('[data-action="toggle-statusline"]');
      if (button) {
        const enabled = data.enabled === true;
        button.dataset.active = enabled ? "true" : "false";
        button.textContent = enabled ? t("cli_enabled") : t("cli_disabled");
      }
    }

    window.usageApplyState = function usageApplyState(state) {
      document.documentElement.classList.toggle('hide-codex', !!state.hideCodex);
      currentLanguage = I18N[state.language] ? state.language : currentLanguage;
      applyStaticText();
      applyCard("claude", state.claude);
      applyCard("codex", state.codex);
      latestState = state;
      renderProjects(
        projectRange === "1d" ? state.projects
        : projectRange === "7d" ? state.projects7d
        : projectRange === "30d" ? state.projects30d
        : projectRange === "all" ? state.projectsAll
        : state.projects
      );
      renderStatusline(state.statusline || {});
      const rate = document.querySelector('[data-footer="rate"]');
      const status = document.querySelector('[data-footer="status"]');
      const today = document.querySelector('[data-footer="today"]');
      if (rate) rate.textContent = state.footer.rate || t("rate_text", { value: "--" });
      if (status) status.textContent = state.footer.status || t("status_text", { value: "--" });
      if (today) today.textContent = state.footer.today || t("today_text", { cost: "0.00", tokens: "0" });
    };

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      if (button.dataset.action === "toggle-project-range") {
        projectRange = projectRange === "1d" ? "7d" : projectRange === "7d" ? "30d" : projectRange === "30d" ? "all" : "1d";
        button.textContent = projectRangeLabel(projectRange);
        if (latestState) {
          renderProjects(
            projectRange === "1d" ? latestState.projects
            : projectRange === "7d" ? latestState.projects7d
            : projectRange === "30d" ? latestState.projects30d
            : projectRange === "all" ? latestState.projectsAll
            : latestState.projects
          );
        }
        return;
      }
      const bridge = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.usage;
      if (bridge && typeof bridge.postMessage === "function") {
        bridge.postMessage(button.dataset.action);
      }
    });

    new ResizeObserver(() => {
      resetCanvas();
    }).observe(document.body);

    resetCanvas();
    window.requestAnimationFrame(drawRain);
    window.usageApplyState({
      language: "en",
      claude: { session: {}, weekly: {} },
      codex: { session: {}, weekly: {} },
      projects: [],
      projects7d: [],
      projects30d: [],
      projectsAll: [],
      statusline: {},
      footer: {
        rate: t("rate_text", { value: "--" }),
        status: t("status_text", { value: "--" }),
        today: t("today_text", { cost: "0.00", tokens: "0" }),
        showInstall: false,
      }
    });
  </script>
</body>
</html>
